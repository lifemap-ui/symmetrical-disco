<!DOCTYPE html>
<html>
<head>
<title>Open Multiple Sites</title>
</head>
<body>

<a href="#" onclick="openSites()">Open All Websites</a>

<script>
function openSites() {
    window.open("https://google.com", "_blank");
    window.open("https://youtube.com", "_blank");
    window.open("https://github.com", "_blank");
}
</script>
<button onclick="openSites()">Open All</button>
</body>
</html>
